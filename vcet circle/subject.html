<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Subject</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    #adminControls {
      margin-bottom: 15px;
    }
    #loginBtn, #logoutBtn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #loginBtn { background-color: #0077cc; color: white; }
    #logoutBtn { background-color: #dc3545; color: white; }

    /* Home button styling - top right */
    .home-btn {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: medium;
      width: 120px;
      padding: 10px 16px;
      background-color: #00d4ff;
      color: black;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      z-index: 1000;
    }
    .home-btn:hover {
      background-color: #00a8cc;
    }
    /* Mobile Responsive Fix */
@media (max-width: 600px) {

  /* Make header text & spacing adjust */
  header {
    font-size: 1.4rem;
    padding: 12px 10px;
  }

  /* Home button becomes smaller + stays inside */
  .top-btn {
    width: 90px;
    font-size: 0.8rem;
    padding: 8px 10px;
    right: 10px;
  }

  /* Back button becomes flexible */
  .back-button {
    font-size: 1rem;
    width: 20%;
    padding: 12px;
    margin-bottom: 15px;
  }
}
/* 📱 Mobile Responsive Fix */
@media (max-width: 600px) {

  /* Header text adjust */
  header {
    font-size: 1.4rem !important;
    padding: 12px 10px !important;
  }

  /* Home button responsive */
  .home-btn {
    width: 90px !important;
    font-size: 0.8rem !important;
    padding: 8px 10px !important;
    right: 10px !important;
    top: 8px !important;
  }

  /* Logout button responsive */
  #logoutBtn {
    font-size: 0.8rem !important;
    padding: 6px 10px !important;
    width: 95px !important;
    margin-top: 10px;
  }

  /* Login button responsive */
  #loginBtn {
    font-size: 0.8rem !important;
    padding: 6px 10px !important;
    width: 95px !important;
  }

  
}


  </style>
</head>
<body>
  <h1 style="background-color: black;color: white;">Select Subject</h1>

  <!-- Home Button -->
  <button class="home-btn" onclick="window.location.href='index.html'"> Home</button>

  <!-- Admin Controls -->
  <div id="adminControls" class="hidden">
    <button id="loginBtn" onclick="showLogin()">🔑 Admin Login</button>
    <button id="logoutBtn" class="hidden" onclick="logout()">🚪 Log Out</button>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="hidden" style="margin-bottom: 20px;">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="card-container" id="subject-list"></div>
  <button class="back-button" onclick="history.back()">⬅ Back</button>

  <script>
    const url = new URLSearchParams(window.location.search);
    const section = url.get("section");
    const branch = url.get("branch");
    const semester = url.get("semester");

    let subjects = [];

    // ✅ Lab Manuals
    if (section === "Lab Manuals") {
      if (branch === "AI" && semester === "3") {
        subjects = ["OS LAB", "DS LAB", "PYTHON LAB", "EXCEL LAB", "DDCO LAB"];
      } else if (branch === "CD" && semester === "3") {
        subjects = ["OS LAB", "DS LAB", "PYTHON LAB", "EXCEL LAB", "DDCO LAB"];
      } else if (branch ==="CD" && semester === "5") {
        subjects = ["DV Lab", "CN Lab"];
      }else if (branch === "CSE" && semester === "3") {
        subjects = ["OS LAB", "DS LAB", "DVP LAB", "DDCO LAB", "OOP LAB"];
      } else if (branch === "CD" && semester === "4") {
        subjects = ["ADA LAB", "MongoDB LAB", "DBMS LAB", "MC LAB"];
      } else if (branch === "CSE" && semester === "4") {
        subjects = ["ADA LAB", "LATEX LAB", "DBMS LAB", "MC LAB"];
      } else if (branch === "AI" && semester === "4") {
        subjects = ["ADA LAB", "MongoDB LAB", "DBMS LAB", "AI LAB"];
      } else if (semester === "1") {
        subjects = ["Physics Manual", "Java Manual", "Mathematics Manual"];
      } else if (semester === "2") {
        subjects = ["Chemistry Manual", "C Manual", "Mathematics"];
      } else {
        subjects = ["Coming Soon"];
      }
    }

    // ✅ Notes, Question Papers, Internal Papers
    else {
      if (semester === "1") {
        subjects = [
          "Mathematics-I",
          "Applied Chemistry",
          "Basics of JAVA Programming",
          "Basic Electrical Engineering",
          "Communicative English",
          "Indian Constitution",
          "Scientific Foundations of Health"
        ];
      } 
      else if (semester === "2") {
        subjects = [
          "Introduction to Electrical Engineering",
          "Introduction to Internet of Things (IOT)",
          "Innovation and Design Thinking",
          "Balake Kannada",
          "Samskrutika Kannada",
          "Mathematics-II",
          "Applied Physics",
          "Principles of Programming using C",
          "Professional Writing Skills in English"
        ];
      }
      else if (semester === "3") {
        if (branch === "AI" || branch === "CD") {
          subjects = [
            "Mathematics",
            "Digital Design & Computer Organization",
            "Operating Systems",
            "Data Structures and Applications",
            "Python Programming"
          ];
        }
        if (branch === "CSE") {
          subjects = [
            "Mathematics for Computer Science",
            "Digital Design & Computer Organization",
            "Operating Systems",
            "Data Structures and Applications",
            "Object Oriented Programming with C++"
          ];
        }
        if (branch === "ECE") {
          subjects = [
            "AV Mathematics-III for EC Engineering",
            "Digital System Design using Verilog",
            "Electronic Principles and Circuits",
            "Network Analysis",
            "Computer Organization and Architecture"
          ];
        }
        if (branch === "ME" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Mechanics of Materials",
            "Manufacturing Process",
            "Material Science and Engineering",
            "Basic Thermodynamics",
            "Waste Handling and Management",
            "Social Connect and Responsibility"
          ];
        }
        if (branch === "CIVIL" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Strength of Materials",
            "Engineering Survey",
            "Engineering Geology",
            "Water Supply and Waste Water Engineering",
            "Sustainable Design Concept for Building Services",
            "Social Connect and Responsibility",
            "Problem Solving Using Python"
          ];
        }
      }
      else if (semester === "4") {
        if (branch === "ECE") {
          subjects = [
            "Electromagnetics Theory",
            "Principles of Communication Systems",
            "Control Systems",
            "Microcontrollers",
            "Biology For Engineers",
            "Universal Human Values Course"
          ];
        }
        if (branch === "CSE" || branch === "CD" || branch === "AI") {
          subjects = [
            "Biology",
            "Analysis and Design of Algorithms",
            "Microcontrollers",
            "Database Management Systems",
            "Discrete Mathematical Structures",
            "Universal Human Values"
          ];
        }
        if (branch === "ME" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Applied Thermodynamics",
            "Machining Science and Metrology",
            "Fluid Mechanics",
            "Non-Traditional Machining",
            "Biology For Engineers",
            "Universal Human Values Course"
          ];
        }
        if (branch === "CIVIL" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Analysis of Structures",
            "Fluid Mechanics and Hydraulics",
            "Transportation Engineering",
            "Construction Equipment, Plants and Machinery",
            "Biology For Engineers",
            "Universal Human Values (UHV)",
            "Building Information Modelling in Civil Engineering – Basics"
          ];
        }
      }
      else if (semester === "5") {
        if (branch === "CSE" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Software Engineering & Project Management",
            "Computer Networks",
            "Theory of Computation",
            "Unix System Programming",
            "Artificial Intelligence",
            "Research Methodology and IPR",
            "Environmental Studies and E-waste"
          ];
        }
        if (branch === "CD" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Software Engineering & Project Management",
            "Computer Networks",
            "Theory of Computation",
            "NOSQL",
            "Data Visualization",
            "Research Methodology and IPR",
            "Environmental Studies and E-waste"
          ];
        }
        if (branch === "AI" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Software Engineering & Project Management",
            "Computer Networks",
            "Theory of Computation",
            "NOSQL",
            "Data Visualization",
            "Research Methodology and IPR",
            "Environmental Studies and E-waste"
          ];
        }
        if (branch === "ECE" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Technological Innovation and Management Entrepreneurship",
            "Digital Signal Processing",
            "Digital Communication",
            "Environmental Studies",
            "Satellite and Optical Communication",
            "Research Methodology & IPR"
          ];
        }
      }
      else if (semester === "6") {
        if (branch === "CSE" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Cloud Computing",
            "Machine Learning",
            "Indian Knowledge System",
            "Advanced Java",
            "Integrated Waste Management for a Smart City"
          ];
        }
        if (branch === "CD" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Big Data Analytics",
            "Artificial Intelligence & Machine Learning",
            "Indian Knowledge System",
            "Software Testing",
            "Integrated Waste Management for a Smart City",
            "UI/UX Laboratory"
          ];
        }
        if (branch === "AI" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Big Data Analytics",
            "Data Science",
            "Indian Knowledge System",
            "Software Testing",
            "Integrated Waste Management for a Smart City",
            "UI/UX Laboratory"
          ];
        }
        if (branch === "ECE" && 
           (section === "Notes" || section === "Question Papers" || section === "Internal Papers")) {
          subjects = [
            "Embedded System Design",
            "VLSI Design and Testing",
            "Indian Knowledge System",
            "Multimedia Communication",
            "Artificial Intelligence",
            "Skill Development Course"
          ];
        }
      }
      else {
        subjects = ["Coming Soon"];
      }
    }

    const list = document.getElementById("subject-list");
    subjects.forEach(subject => {
      const a = document.createElement("a");
      a.className = "card";
      a.textContent = subject;

      let nextPage = "";
      if (section === "Notes") {
        nextPage = `module-select.html`;
      } else if (section === "Question Papers") {
        nextPage = `question-view.html`;
      } else if (section === "Internal Papers") {
        nextPage = `internal-view.html`;
      } else if (section === "Lab Manuals") {
        nextPage = `lab-view.html`;
      } else {
        nextPage = `module-select.html`;
      }

      a.href = `${nextPage}?section=${section}&branch=${branch}&semester=${semester}&subject=${encodeURIComponent(subject)}`;
      list.appendChild(a);
    });

    // ✅ Admin login system
    document.addEventListener("DOMContentLoaded", () => {
      const isAdmin = localStorage.getItem("isAdmin") === "true";
      updateLoginUI(isAdmin);
    });

    document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "a") {
        document.getElementById("adminControls").classList.remove("hidden");
        alert("🔓 Admin login option unlocked");
      }
    });

    function showLogin() {
      document.getElementById("loginModal").classList.remove("hidden");
    }

    function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if (user === "vcet" && pass === "vcet123") {
        alert("✅ Login Successful");
        localStorage.setItem("isAdmin", "true");
        updateLoginUI(true);
        document.getElementById("loginModal").classList.add("hidden");
      } else {
        alert("❌ Invalid credentials");
      }
    }

    function logout() {
      localStorage.removeItem("isAdmin");
      updateLoginUI(false);
      alert("✅ Logged out successfully");
    }

    function updateLoginUI(isAdmin) {
      if (isAdmin) {
        document.getElementById("adminControls").classList.remove("hidden");
      }
      document.getElementById("loginBtn").classList.toggle("hidden", isAdmin);
      document.getElementById("logoutBtn").classList.toggle("hidden", !isAdmin);
    }
  </script>
</body>
</html>
