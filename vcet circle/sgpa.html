let sgpaValue = 0, percValue = 0;

/* ------------------ LOAD SUBJECTS ------------------ */
function loadSubjects(){
  const br = document.getElementById('branch').value;
  const sem = document.getElementById('semester').value;
  const tbody = document.querySelector('#subjectsTable tbody');
  tbody.innerHTML = '';

  const list = subjectData[br][sem] || [];
  list.forEach(([code,credit])=>{
    tbody.insertAdjacentHTML('beforeend',
      `<tr>
        <td>${code}</td>
        <td>${credit}</td>
        <td><input type="number" min="0" max="100" placeholder="Marks"></td>
      </tr>`);
  });
}

/* ------------------ MARKS TO GRADE ------------------ */
function marksToPoint(m){
  if(m >= 90) return 10;
  if(m >= 80) return 9;
  if(m >= 70) return 8;
  if(m >= 60) return 7;
  if(m >= 55) return 6;
  if(m >= 50) return 5;
  if(m >= 40) return 4;
  return 0;
}

/* ------------------ CALCULATE SGPA (UPDATED: must fill all fields) ------------------ */
function calculateSGPA(){
  const rows = document.querySelectorAll('#subjectsTable tbody tr');

  // CHECK: All subject marks must be entered
  for (let r of rows) {
    const marks = r.querySelector('input').value.trim();
    if (marks === "" || isNaN(marks)) {
      alert("⚠️ Please enter marks for ALL subjects before calculating SGPA.");
      return;
    }
  }

  let totalPts = 0, totalCred = 0;

  rows.forEach(r=>{
    const marks = parseFloat(r.querySelector('input').value);
    const cred = parseFloat(r.children[1].textContent);

    totalPts += marksToPoint(marks) * cred;
    totalCred += cred;
  });

  sgpaValue = totalPts / totalCred;
  percValue = (sgpaValue - 0.75) * 10;

  document.getElementById('out').innerHTML =
    `🎓 SGPA: <strong>${sgpaValue.toFixed(2)}</strong> — 📊 Percentage: <strong>${percValue.toFixed(2)}%</strong>`;
}

/* ------------------ DOWNLOAD RESULT PDF ------------------ */
function downloadResult(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const branch = document.getElementById("branch").selectedOptions[0].text;
  const sem = document.getElementById("semester").selectedOptions[0].text;
  const rows = document.querySelectorAll("#subjectsTable tbody tr");

  if(rows.length === 0){ alert("Please calculate SGPA first!"); return; }

  doc.setFont("helvetica","bold");
  doc.setFontSize(16);
  doc.text("VTU SGPA Report — 2022 Scheme", 55, 15);

  doc.setFontSize(10);
  doc.text(`Branch: ${branch}`, 14, 25);
  doc.text(`Semester: ${sem}`, 14, 31);
  doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 37);

  const tableData = Array.from(rows).map(r => {
    const code = r.children[0].innerText;
    const cred = r.children[1].innerText;
    const marks = r.querySelector("input").value;
    const grade = marksToPoint(parseFloat(marks));
    return [code, cred, marks, grade];
  });

  doc.autoTable({
    startY: 45,
    head: [["Subject Code", "Credits", "Marks", "Grade Point"]],
    body: tableData,
    theme: "grid",
    headStyles: { fillColor: [37,99,235] }
  });

  const y = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(12);
  doc.text(`SGPA: ${sgpaValue.toFixed(2)}`, 14, y);
  doc.text(`Percentage: ${percValue.toFixed(2)}%`, 14, y + 8);

  doc.setFontSize(9);
  doc.text("Generated by VCET Hub", 80, 285);

  doc.save("VTU_SGPA_Report.pdf");
}
