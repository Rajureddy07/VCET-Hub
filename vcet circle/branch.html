<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Branch</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Header styling with centered title */
    header {
      position: relative;
      background-color: #111;
      color: #00d4ff;
      padding: 15px 20px;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center; /* centers the title */
      border-bottom: 1px solid #333;
    }

    /* Home button styling with increased width */
    .top-btn {
      position: absolute;
      right: 20px;
      top: 50%;
      font-size: medium;
      transform: translateY(-50%);
      width: 120px; /* increased width */
      padding: 10px 16px;
      background-color: #00d4ff;
      color: #111;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .top-btn:hover {
      transform: translateY(-50%) translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 212, 255, 0.5);
    }
    /* Mobile Responsive Fix */
@media (max-width: 600px) {

  /* Make header text & spacing adjust */
  header {
    font-size: 1.4rem;
    padding: 12px 10px;
  }

  /* Home button becomes smaller + stays inside */
  .top-btn {
    width: 90px;
    font-size: 0.8rem;
    padding: 8px 10px;
    right: 10px;
  }

  /* Back button becomes flexible */
  .back-button {
    font-size: 1rem;
    width: 20%;
    padding: 12px;
    margin-bottom: 15px;
  }
}

  </style>
</head>
<body>

<!-- Header with centered title and Home button -->
<header>
  Select Branch
  <button onclick="window.location.href='index.html'" class="top-btn">Home</button>
</header>

<div class="card-container">
  <script>
    const section = new URLSearchParams(window.location.search).get('section');
    const branches = ["CSE", "ECE", "CD", "AI", "ME", "CIVIL"];
    branches.forEach(branch => {
      document.write(`<a class="card" href="semester.html?section=${section}&branch=${branch}">${branch}</a>`);
    });
  </script>
</div>

<button class="back-button" onclick="history.back()">⬅ Back</button>

</body>
</html>
