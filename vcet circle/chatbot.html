<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VCET Hub - AI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0e0e0e;
      color: #f5f5f5;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background-color: #1a1a1a;
      padding: 15px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #00bfff;
      border-bottom: 1px solid #333;
      position: relative;
    }
    .top-controls {
      position: absolute;
      top: 10px;
      right: 15px;
      display: flex;
      gap: 10px;
    }
    .control-btn {
      background-color: #222;
      color: #00bfff;
      padding: 8px 12px;
      border: 1px solid #00bfff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .control-btn:hover { background-color: #00bfff; color: white; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background: linear-gradient(180deg, #0c0c0c 0%, #0e0e0e 100%);
    }
    .message {
      max-width: 75%;
      padding: 12px 15px;
      border-radius: 12px;
      line-height: 1.5;
      animation: fadeIn 0.25s ease-in-out;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user-message {
      align-self: flex-end;
      background-color: #0078ff;
      color: white;
      border-bottom-right-radius: 2px;
    }
    .bot-message {
      align-self: flex-start;
      background-color: #222;
      color: #f5f5f5;
      border-bottom-left-radius: 2px;
    }
    .files-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .file-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #00bfff;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .file-button:hover { background-color: #0099cc; }
    #input-area {
      display: flex;
      border-top: 1px solid #333;
      background-color: #111;
      padding: 10px;
      align-items: center;
    }
    #user-input {
      flex: 1;
      background-color: #1a1a1a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }
    #send-btn {
      background-color: #00bfff;
      border: none;
      color: white;
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: 8px;
      margin-left: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    #send-btn:hover { background-color: #0099cc; }
    .back-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #222;
      color: #00bfff;
      padding: 8px 14px;
      border: 1px solid #00bfff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      transition: 0.2s;
    }
    .back-btn:hover { background-color: #00bfff; color: #fff; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }
  </style>
</head>
<body>
  <header>
    🤖 VCET Hub - AI Chatbot
    <div class="top-controls">
      <button class="control-btn" onclick="newChat()">New Chat</button>
      <button class="control-btn" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <a href="index.html" class="back-btn">← Home</a>

  <div id="chat-container"></div>

  <div id="input-area">
    <input type="text" id="user-input" autocomplete="off"
           placeholder="Ask like: 'CSE 1st Sem Maths Module 1 notes in PDF' or say 'recent uploads'"
           onkeypress="checkEnter(event)">
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:5000/chat";
    const chatContainer = document.getElementById("chat-container");
    const userInput = document.getElementById("user-input");

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function createMessageElement(sender, htmlContent) {
      const el = document.createElement("div");
      el.classList.add("message", sender === "user" ? "user-message" : "bot-message");
      el.innerHTML = htmlContent;
      return el;
    }

    // ✅ FIXED FUNCTION — handles both string URLs and file objects
    function appendMessage(sender, text, files = []) {
      let content = text || "";
      const el = createMessageElement(sender, content);

      if (files && files.length > 0) {
        const filesWrap = document.createElement("div");
        filesWrap.className = "files-wrap";

        files.forEach((file, i) => {
          const fileUrl = typeof file === "string" ? file : file.file_url;
          const fileName = typeof file === "string" ? `Download File ${i + 1}` : (file.name || `Download File ${i + 1}`);
          const a = document.createElement("a");
          a.href = fileUrl;
          a.className = "file-button";
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.innerText = `📘 ${fileName}`;
          filesWrap.appendChild(a);
        });

        el.appendChild(filesWrap);
      }

      chatContainer.appendChild(el);
      scrollToBottom();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      appendMessage("user", escapeHtml(text));
      userInput.value = "";
      userInput.focus();

      const loadingEl = createMessageElement("bot", "⏳ Searching VCET Hub notes...");
      chatContainer.appendChild(loadingEl);
      scrollToBottom();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();
        chatContainer.removeChild(loadingEl);

        if (typeof data.reply === "string" && data.reply.includes("<a ")) {
          appendMessage("bot", data.reply);
          return;
        }

        if (Array.isArray(data.files) && data.files.length > 0) {
          appendMessage("bot", data.reply || "Here are the files I found:", data.files);
          return;
        }

        const reply = (data.reply && data.reply.trim()) ? data.reply : "⚠ No response from bot.";
        appendMessage("bot", escapeHtml(reply));
      } catch (err) {
        if (loadingEl.parentNode) chatContainer.removeChild(loadingEl);
        appendMessage("bot", "⚠ Unable to connect to backend. Make sure Flask is running.");
      }
    }

    function escapeHtml(unsafe) {
      return unsafe
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function checkEnter(e) {
      if (e.key === "Enter") sendMessage();
    }

    function clearChat() {
      chatContainer.innerHTML = "";
      appendMessage("bot", "🧹 Chat cleared. Ready for a new question!");
    }

    function newChat() {
      chatContainer.innerHTML = "";
      appendMessage("bot", "✨ New chat started. How can I help you?");
    }

    window.onload = () => {
      appendMessage("bot", "👋 Hello! I’m your VCET Hub AI assistant. Ask like: 'CSE 3rd sem Python Module 1 PDF'.");
    };
  </script>
</body>
</html>
