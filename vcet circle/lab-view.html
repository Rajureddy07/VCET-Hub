<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab Manuals</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #050505;
      color: #e0e0e0;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      background: #333;
      padding: 12px;
      border-radius: 8px;
    }

    .file-box {
      border: 2px solid #f2f6f3;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 8px;
      background: #3b3b3b;
      color: black;
    }

    .preview-box {
      border: 3px solid #eef2ef;
      border-radius: 8px;
      background: #f9f9f9;
      width: 100%;
      max-width: 500px;
      max-height: 70vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      margin: 0 auto 12px auto;
    }

    .preview-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      margin-bottom: 10px;
      border: 1px solid #ccc;
      max-width: 90%;
      height: auto;
      display: block;
    }

    .download-container {
      text-align: center;
      margin-top: 12px;
    }

    .download-btn {
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
    }

    .download-btn:hover {
      background: #0056b3;
    }

    .delete-btn {
      margin-top: 6px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #dc3545;
      color: white;
      margin-left: 10px;
    }

    .back-button {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: #6c757d;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .hidden { display: none !important; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
</head>

<body>

  <h1 id="title">Loading...</h1>

  <!-- Upload Section (Admin Only) -->
  <div id="uploadSection" class="hidden">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
    <p id="uploadStatus"></p>
  </div>

  <!-- Uploaded Files -->
  <div class="card-container" id="fileList"></div>

  <button class="back-button" onclick="history.back()">⬅ Back</button>

  <script>

    /* ---------------------- PAGE SETUP ---------------------- */
    const url = new URLSearchParams(window.location.search);
    const branch = url.get("branch");
    const semester = url.get("semester");
    const subject = url.get("subject");
    const module = url.get("module");

    // Fix "null Lab Manual"
    let cleanModule = module && module !== "null" ? module : "";
    document.getElementById("title").textContent =
      cleanModule ? `${subject} - ${cleanModule} Lab Manual` : `${subject} Lab Manual`;

    const isAdmin = localStorage.getItem("isAdmin") === "true";
    if (isAdmin) {
      document.getElementById("uploadSection").classList.remove("hidden");
    }

    /* ---------------------- UPLOAD FILE ---------------------- */
    function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      if (!fileInput.files.length) return alert("⚠ Please choose a file!");

      if (!confirm("Upload this file?")) return;

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      formData.append("branch", branch);
      formData.append("semester", semester);
      formData.append("subject", subject);
      formData.append("module", module);

      fetch("http://localhost:5000/upload", { method: "POST", body: formData })
        .then(res => res.json())
        .then(data => {
          alert(data.message || "Uploaded!");
          fileInput.value = "";
          loadFiles();
        })
        .catch(err => alert("Upload error: " + err.message));
    }

    /* ---------------------- RENDER PDF ---------------------- */
    function renderPDF(url, container) {
      const pdfjsLib = window["pdfjs-dist/build/pdf"];
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.worker.min.js";

      container.innerHTML = "";

      pdfjsLib.getDocument(url).promise.then(pdfDoc => {
        for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
          pdfDoc.getPage(pageNum).then(page => {
            const viewport = page.getViewport({ scale: 1.2 });
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            page.render({ canvasContext: ctx, viewport }).promise.then(() => {
              container.appendChild(canvas);
            });
          });
        }
      });
    }

    /* ---------------------- DELETE FILE ---------------------- */
    function deleteFile(filename) {
      if (!confirm("⚠ Delete this file?")) return;

      // FIX: Lab manuals do not have module → assign default module
      const safeModule =
        module && module !== "null" && module !== "undefined" && module !== ""
          ? module
          : "Lab-Manual";

      fetch("http://localhost:5000/delete_file", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          branch,
          semester,
          subject,
          module: safeModule,
          filename
        })
      })
        .then((res) => res.json())
        .then((data) => {
          alert(data.message);
          loadFiles();
        })
        .catch((err) => alert("Error deleting: " + err.message));
    }


    /* ---------------------- LOAD FILES ---------------------- */
    function loadFiles() {
      fetch(`http://localhost:5000/images?branch=${branch}&semester=${semester}&subject=${subject}&module=${module}`)
        .then(res => res.json())
        .then(files => {
          const list = document.getElementById("fileList");
          list.innerHTML = "";

          if (!files.length) {
            list.textContent = "📭 No Lab Manuals uploaded.";
            return;
          }

          files.forEach(entry => {
            const file = entry.file;
            const type = file.split(".").pop().toLowerCase();

            const container = document.createElement("div");
            container.className = "file-box";

            const previewBox = document.createElement("div");
            previewBox.className = "preview-box";

            const previewContent = document.createElement("div");
            previewContent.className = "preview-content";

            if (["jpg", "jpeg", "png"].includes(type)) {
              const img = document.createElement("img");
              img.src = `http://localhost:5000/${file}`;
              previewContent.appendChild(img);
            } else if (type === "pdf") {
              renderPDF(`http://localhost:5000/${file}`, previewContent);
            }

            previewBox.appendChild(previewContent);
            container.appendChild(previewBox);

            const downloadDiv = document.createElement("div");
            downloadDiv.className = "download-container";

            const download = document.createElement("a");
            download.href = `http://localhost:5000/${file}`;
            download.textContent = "📥 Download File";
            download.className = "download-btn";
            download.download = true;

            downloadDiv.appendChild(download);

            if (isAdmin) {
              const del = document.createElement("button");
              del.className = "delete-btn";
              del.textContent = "🗑 Delete File";
              del.onclick = () => deleteFile(file.split("/").pop());
              downloadDiv.appendChild(del);
            }

            container.appendChild(downloadDiv);
            list.appendChild(container);
          });
        });
    }

    loadFiles();
  </script>

</body>
</html>
