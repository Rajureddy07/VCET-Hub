<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab Manual Files</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 id="title">Loading...</h1>

  <!-- Upload Section (admin only) -->
  <div id="uploadSection" class="hidden">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
    <p id="uploadStatus"></p>
  </div>

  <div class="card-container" id="fileList"></div>

  <button class="back-button" onclick="history.back()">⬅ Back</button>

  <script>
    const isAdmin = true ; // change to true for admin access

    const url = new URLSearchParams(window.location.search);
    const branch = url.get("branch");
    const semester = url.get("semester");
    const subject = url.get("subject");

    document.getElementById("title").textContent = `${subject}`;

    if (isAdmin) {
      document.getElementById("uploadSection").classList.remove("hidden");
    }

    function uploadFile() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return alert("Please select a file");

      const formData = new FormData();
      formData.append("file", file);
      formData.append("branch", branch);
      formData.append("semester", semester);
      formData.append("subject", subject);

      fetch("http://localhost:5000/upload", {
        method: "POST",
        body: formData
      }).then(res => res.json())
        .then(data => {
          if (data.url) {
            alert("✅ Upload successful");
            loadFiles();
          } else {
            alert("❌ Upload failed");
          }
        }).catch(() => alert("❌ Server error"));
    }

    function loadFiles() {
      fetch(`http://localhost:5000/images?branch=${branch}&semester=${semester}&subject=${subject}`)
        .then(res => res.json())
        .then(files => {
          const list = document.getElementById("fileList");
          list.innerHTML = "";

          if (files.length === 0) {
            list.textContent = "📭 No files uploaded yet.";
            return;
          }

          files.forEach(file => {
            const card = document.createElement("div");
            card.className = "card";

            const fileType = file.split('.').pop().toLowerCase();

            if (["jpg", "jpeg", "png"].includes(fileType)) {
              const img = document.createElement("img");
              img.src = `http://localhost:5000/${file}`;
              card.appendChild(img);
            } else if (fileType === "pdf") {
              const iframe = document.createElement("iframe");
              iframe.src = `http://localhost:5000/${file}`;
              iframe.height = "300px";
              iframe.width = "100%";
              card.appendChild(iframe);
            }

            const downloadLink = document.createElement("a");
            downloadLink.href = `http://localhost:5000/${file}`;
            downloadLink.textContent = "📥 Download";
            downloadLink.className = "download-btn";
            downloadLink.download = true;
            card.appendChild(downloadLink);

            if (isAdmin) {
              const deleteBtn = document.createElement("button");
              deleteBtn.textContent = "🗑️ Delete";
              deleteBtn.style.marginLeft = "10px";
              deleteBtn.style.backgroundColor = "#dc3545";
              deleteBtn.style.color = "#fff";
              deleteBtn.style.padding = "6px 12px";
              deleteBtn.style.border = "none";
              deleteBtn.style.borderRadius = "6px";
              deleteBtn.style.cursor = "pointer";

              deleteBtn.onclick = () => {
                if (confirm("Are you sure you want to delete this file?")) {
                  fetch("http://localhost:5000/delete", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      branch,
                      semester,
                      subject,
                      filename: file.split("/").pop()
                    })
                  })
                  .then(res => res.json())
                  .then(result => {
                    if (result.status === "success") {
                      alert("✅ File deleted");
                      loadFiles();
                    } else {
                      alert("❌ Failed to delete");
                    }
                  });
                }
              };

              card.appendChild(deleteBtn);
            }

            list.appendChild(card);
          });
        });
    }

    loadFiles();
  </script>
</body>
</html>
